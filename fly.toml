# fly.toml -- agm_lpac_attendance
# https://fly.io/docs/reference/configuration/
#
# アプリ名は `fly apps create --generate-name --org personal` で払い出された名前を
# ここに貼り付けてください（例: app-abc-xyz-1234）。初回デプロイ前に必ず書き換えること。

app = "little-glade-311"
primary_region = "nrt"          # Tokyo リージョン

[build]
  # Dockerfile を使用（同ディレクトリにある Dockerfile が自動的に選ばれる）

[env]
  PORT     = "8080"
  TZ       = "Asia/Tokyo"
  # Flask 本体に渡る環境変数。SECRET_KEY / DATABASE_URL / MAIL_* は fly secrets に入れる
  PYTHONUNBUFFERED = "1"

[http_service]
  internal_port        = 8080
  force_https          = true
  # ---- 使用時のみ起動（コスト最小化）。アクセスが来たら自動起動、
  #      無アクセスが続いたら自動停止。コールドスタート 1〜3 秒程度 ----
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 100
    soft_limit = 80

# ヘルスチェック: /login は認証不要で 200 を返す（ログインページの HTML）
[[http_service.checks]]
  interval     = "30s"
  timeout      = "5s"
  grace_period = "20s"
  method       = "GET"
  path         = "/login"

[[vm]]
  size     = "shared-cpu-1x"
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1
